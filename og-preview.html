<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 40%, rgba(232,255,71,0.15), transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(71,255,232,0.1), transparent 50%);
}
.container {
  text-align: center;
  z-index: 1;
  padding: 60px;
}
.logo {
  font-size: 120px;
  margin-bottom: 30px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.9; }
}
h1 {
  font-size: 64px;
  font-weight: 800;
  color: #f0f0f0;
  margin: 0 0 20px 0;
  letter-spacing: -0.02em;
}
.accent {
  color: #e8ff47;
}
p {
  font-size: 28px;
  color: #999;
  margin: 0 0 40px 0;
}
.stats {
  display: flex;
  gap: 50px;
  justify-content: center;
  margin-top: 40px;
}
.stat {
  text-align: center;
}
.stat-value {
  font-size: 48px;
  font-weight: 700;
  color: #e8ff47;
  display: block;
  font-variant-numeric: tabular-nums;
}
.stat-label {
  font-size: 18px;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 8px;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">⚡</div>
  <h1>Real-time electricity prices.<br><span class="accent">One API.</span></h1>
  <p>Monitor 15 European countries · No API key required</p>
  <div class="stats">
    <div class="stat">
      <span class="stat-value">15</span>
      <span class="stat-label">Countries</span>
    </div>
    <div class="stat">
      <span class="stat-value">96</span>
      <span class="stat-label">Data Points/Day</span>
    </div>
    <div class="stat">
      <span class="stat-value">&lt;15s</span>
      <span class="stat-label">Response Time</span>
    </div>
  </div>
</div>
</body>
</html>
